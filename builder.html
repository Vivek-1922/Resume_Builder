<!DOCTYPE html>
<html>

<head>
    <title>Resume Builder</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

    <h2>Create Your Resume</h2>
    <input type="file" id="imageInput" accept="image/*"><br><br>
<div class="container">

        <!-- FORM -->
       <div class="form-section">

            <input type="text" id="name" placeholder="Your Name"><br><br>
            <input type="text" id="email" placeholder="Email"><br><br>


            <h3>Links</h3>
            <input type="text" id="links" placeholder="GitHub / LinkedIn / Portfolio"><br><br>
            <h3>Address</h3>
            <textarea id="address" placeholder="Your Address"></textarea><br><br>

            <h3>About Me</h3>
            <textarea id="about">
Motivated and detail-oriented individual with a strong passion for learning and growth. 
Committed to delivering quality work and continuously improving skills to achieve professional excellence.
</textarea>
            <h3>Education</h3>
            <textarea id="education" placeholder="Your Education"></textarea><br><br>

            <h3>Skills</h3>
            <textarea id="skills" placeholder="Your Skills (comma separated)"></textarea><br><br>

            <div id="projectsSection">
                <h3>Projects</h3>

               

                <div id="projectsContainer">
                   <input type="text" class="projectInput" placeholder="Project 1">
                </div>

                <button onclick="addProject()">+ Add Project</button>
            </div>

            <h3>Experience</h3>
            <textarea id="experience" placeholder="Your Experience"></textarea>

        </div>
        <div>
            <button onclick="setTemplate('template1')">Simple</button>
            <button onclick="setTemplate('template2')">Modern</button>
        </div>
        <!-- PREVIEW -->
        <div style="text-align:center;">
            <img id="p_image" src="" width="120" style="display:none; border-radius:50%;">
        </div>

        <div id="preview" class="template1">

            <h2 id="p_name"></h2>
            <p id="p_email"></p>

            <h3>Address</h3>
            <p id="p_address"></p>

            <h3>Links</h3>
            <p id="p_links"></p>

            <h3>About Me</h3>
            <p id="p_about"></p>

            <h3>Education</h3>
            <p id="p_education"></p>

            <h3>Skills</h3>
            <ul id="p_skills"></ul>

            <h3>Projects</h3>
            <ul id="p_projects"></ul>

            <h3>Experience</h3>
            <p id="p_experience"></p>

        </div>
    </div>

    <button onclick="downloadPDF()">Download PDF</button>

    <script src="script.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>

</body>

</html>
